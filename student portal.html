<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Portal</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: white;
  border-bottom: 1px solid #ddd;
}

h1 {
  margin: 0;
}

button {
  padding: 6px 12px;
  cursor: pointer;
}

/* STATS */
.stats {
  display: flex;
  gap: 15px;
  padding: 20px 30px;
}

.stat {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
}

/* SEARCH */
.controls {
  padding: 0 30px 20px;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 8px;
}

/* GRID */
.grid {
  padding: 0 30px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.tag {
  background: #e0f2ff;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* highlight */
mark {
  background: yellow;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Course Portal</h1>
    <small>Student Management System</small>
  </div>
  <button onclick="toggleForm()">+ Add Course</button>
</header>

<!-- STATS -->
<div class="stats">
  <div class="stat">Total: <b id="total"></b></div>
  <div class="stat">Available: <b id="avail"></b></div>
  <div class="stat">Enrolled: <b id="enrolled"></b></div>
  <div class="stat">Full: <b id="full"></b></div>
</div>

<!-- SEARCH -->
<div class="controls">
  <input id="search" placeholder="Search...">
</div>

<!-- COURSE GRID -->
<div class="grid" id="grid"></div>

<!-- ADD FORM -->
<div id="form" style="display:none; padding:20px 30px;">
  <input id="name" placeholder="Course Name"><br><br>
  <input id="code" placeholder="Code"><br><br>
  <input id="dept" placeholder="Department"><br><br>
  <input id="seats" type="number" placeholder="Seats"><br><br>
  <button onclick="addCourse()">Add</button>
</div>

<script>
let courses = [
  {id:1, name:"Introduction to Algorithms", code:"CS101", dept:"Computer Science", seats:27, total:30},
  {id:2, name:"Calculus II", code:"MATH201", dept:"Mathematics", seats:25, total:40},
  {id:3, name:"Quantum Mechanics", code:"PHY301", dept:"Physics", seats:0, total:20}
];

let enrolled = 0;

/* RENDER */
function render() {
  let search = document.getElementById("search").value.toLowerCase();
  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  let avail = 0;
  let full = 0;

  courses.forEach(c => {
    if (c.seats > 0) avail++;
    else full++;

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${highlight(c.name, search)}</h3>
      <span class="tag">${highlight(c.dept, search)}</span>
      <p>${highlight(c.code, search)}</p>
      <p>Seats: ${c.seats}/${c.total}</p>
      <button onclick="enroll(${c.id})" ${c.seats==0?"disabled":""}>
        ${c.seats==0?"Full":"Enroll"}
      </button>
    `;

    grid.appendChild(card);
  });

  document.getElementById("total").innerText = courses.length;
  document.getElementById("avail").innerText = avail;
  document.getElementById("full").innerText = full;
  document.getElementById("enrolled").innerText = enrolled;
}

/* HIGHLIGHT */
function highlight(text, search) {
  if (!search) return text;
  return text.replace(new RegExp(search, "gi"),
    m => `<mark>${m}</mark>`);
}

/* ENROLL */
function enroll(id) {
  let c = courses.find(x => x.id == id);
  if (c.seats > 0) {
    c.seats--;
    enrolled++;
    render();
  }
}

/* ADD COURSE */
function addCourse() {
  let name = document.getElementById("name").value;
  let code = document.getElementById("code").value;
  let dept = document.getElementById("dept").value;
  let seats = parseInt(document.getElementById("seats").value);

  if (!name || !code || !dept || !seats) {
    alert("Fill all fields");
    return;
  }

  courses.push({
    id: Date.now(),
    name,
    code,
    dept,
    seats,
    total: seats
  });

  toggleForm();
  render();
}

/* TOGGLE FORM */
function toggleForm() {
  let f = document.getElementById("form");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

document.getElementById("search").addEventListener("input", render);

render();
</script>

</body>
</html>
